<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andromeda Studios App</title>
<style>
  /* Fullscreen black background */
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
  }

  /* Star twinkle animation */
  @keyframes twinkle {
    0%, 100% {opacity:1;}
    50% {opacity:0.5;}
  }

  .stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    z-index: -1;
  }

  .stars::before {
    content: '';
    position: absolute;
    top:50%;
    left:50%;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    box-shadow:
      10px 20px white, 30px 40px white, 50px 80px white, 70px 100px white,
      90px 30px white, 110px 60px white, 130px 20px white, 150px 90px white,
      170px 40px white, 190px 70px white;
    animation: twinkle 3s infinite ease-in-out;
    transform: translate(-50%,-50%);
  }

  h1 {
    font-size: 4rem;
    margin-bottom: 2rem;
    letter-spacing: 0.2rem;
    text-transform: uppercase;
  }

  /* Download button */
  .download-btn {
    padding: 20px 40px;
    font-size: 1.5rem;
    font-weight: bold;
    color: black;
    background-color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s;
  }

  .download-btn:hover {
    transform: scale(1.05);
  }

</style>
</head>
<body>
  <div class="stars"></div>
  <h1>Andromeda Studios</h1>
  <a class="download-btn" href="https://github.com/USERNAME/REPO/releases/download/v1.0/main.exe" download>
    Download
  </a>
</body>
</html>
